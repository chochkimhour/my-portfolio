name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  quality:
    name: Lint and Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.19.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build application
        run: npm run build
        env:
          USER_NAME: ${{ vars.USER_NAME }}
          USER_ROLE: ${{ vars.USER_ROLE }}
          USER_EMAIL: ${{ vars.USER_EMAIL }}
          USER_LOCATION: ${{ vars.USER_LOCATION }}
          GITHUB_URL: ${{ vars.GITHUB_URL }}
          GITLAB_URL: ${{ vars.GITLAB_URL }}
          LINKEDIN_URL: ${{ vars.LINKEDIN_URL }}
          NPM_PACKAGE_URL: ${{ vars.NPM_PACKAGE_URL }}
          TELEGRAM_URL: ${{ vars.TELEGRAM_URL }}
          TELEGRAM_USERNAME: ${{ vars.TELEGRAM_USERNAME }}
          PROJECT_1_TITLE: ${{ vars.PROJECT_1_TITLE }}
          PROJECT_1_DESCRIPTION: ${{ vars.PROJECT_1_DESCRIPTION }}
          PROJECT_1_TECH: ${{ vars.PROJECT_1_TECH }}
          PORTFOLIO_URL: ${{ vars.PORTFOLIO_URL }}
          PORTFOLIO_REPO_URL: ${{ vars.PORTFOLIO_REPO_URL }}
          PROJECT_2_TITLE: ${{ vars.PROJECT_2_TITLE }}
          PROJECT_2_DESCRIPTION: ${{ vars.PROJECT_2_DESCRIPTION }}
          PROJECT_2_TECH: ${{ vars.PROJECT_2_TECH }}
          API_CORE_BACKEND_NPM_URL: ${{ vars.API_CORE_BACKEND_NPM_URL }}
          API_CORE_BACKEND_REPO_URL: ${{ vars.API_CORE_BACKEND_REPO_URL }}
          PROJECT_3_TITLE: ${{ vars.PROJECT_3_TITLE }}
          PROJECT_3_DESCRIPTION: ${{ vars.PROJECT_3_DESCRIPTION }}
          PROJECT_3_TECH: ${{ vars.PROJECT_3_TECH }}
          INIT_BACKEND_PROJECT_NPM_URL: ${{ vars.INIT_BACKEND_PROJECT_NPM_URL }}
          INIT_BACKEND_PROJECT_REPO_URL: ${{ vars.INIT_BACKEND_PROJECT_REPO_URL }}
          SKILLS_LANGUAGES: ${{ vars.SKILLS_LANGUAGES }}
          SKILLS_FRAMEWORKS: ${{ vars.SKILLS_FRAMEWORKS }}
          SKILLS_DATABASES: ${{ vars.SKILLS_DATABASES }}
          SKILLS_DEVOPS: ${{ vars.SKILLS_DEVOPS }}
          EXPERTISE_ITEMS: ${{ vars.EXPERTISE_ITEMS }}
          STATS_1_LABEL: ${{ vars.STATS_1_LABEL }}
          STATS_1_VALUE: ${{ vars.STATS_1_VALUE }}
          STATS_2_LABEL: ${{ vars.STATS_2_LABEL }}
          STATS_2_VALUE: ${{ vars.STATS_2_VALUE }}
          TAGLINE: ${{ vars.TAGLINE }}
          BRAND_DESCRIPTION: ${{ vars.BRAND_DESCRIPTION }}
          ABOUT_P1: ${{ vars.ABOUT_P1 }}
          ABOUT_P2: ${{ vars.ABOUT_P2 }}
          SEO_TITLE: ${{ vars.SEO_TITLE }}
          SEO_DESCRIPTION: ${{ vars.SEO_DESCRIPTION }}
          SEO_OG_TITLE: ${{ vars.SEO_OG_TITLE }}
          SEO_OG_DESCRIPTION: ${{ vars.SEO_OG_DESCRIPTION }}
          SERVICE_1_TITLE: ${{ vars.SERVICE_1_TITLE }}
          SERVICE_1_DESCRIPTION: ${{ vars.SERVICE_1_DESCRIPTION }}
          SERVICE_2_TITLE: ${{ vars.SERVICE_2_TITLE }}
          SERVICE_2_DESCRIPTION: ${{ vars.SERVICE_2_DESCRIPTION }}
          SERVICE_3_TITLE: ${{ vars.SERVICE_3_TITLE }}
          SERVICE_3_DESCRIPTION: ${{ vars.SERVICE_3_DESCRIPTION }}
          EXPERIENCE_1_COMPANY: ${{ vars.EXPERIENCE_1_COMPANY }}
          EXPERIENCE_1_ROLE: ${{ vars.EXPERIENCE_1_ROLE }}
          EXPERIENCE_1_START_DATE: ${{ vars.EXPERIENCE_1_START_DATE }}
          EXPERIENCE_1_END_DATE: ${{ vars.EXPERIENCE_1_END_DATE }}
          EXPERIENCE_1_DESCRIPTION: ${{ vars.EXPERIENCE_1_DESCRIPTION }}
          EXPERIENCE_2_COMPANY: ${{ vars.EXPERIENCE_2_COMPANY }}
          EXPERIENCE_2_ROLE: ${{ vars.EXPERIENCE_2_ROLE }}
          EXPERIENCE_2_START_DATE: ${{ vars.EXPERIENCE_2_START_DATE }}
          EXPERIENCE_2_END_DATE: ${{ vars.EXPERIENCE_2_END_DATE }}
          EXPERIENCE_2_DESCRIPTION: ${{ vars.EXPERIENCE_2_DESCRIPTION }}
          EXPERIENCE_3_COMPANY: ${{ vars.EXPERIENCE_3_COMPANY }}
          EXPERIENCE_3_ROLE: ${{ vars.EXPERIENCE_3_ROLE }}
          EXPERIENCE_3_START_DATE: ${{ vars.EXPERIENCE_3_START_DATE }}
          EXPERIENCE_3_END_DATE: ${{ vars.EXPERIENCE_3_END_DATE }}
          EXPERIENCE_3_DESCRIPTION: ${{ vars.EXPERIENCE_3_DESCRIPTION }}

      - name: Upload GitHub Pages artifact
        if: github.event_name == 'push'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    name: Deploy to GitHub Pages
    if: github.event_name == 'push'
    needs: quality
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy site
        id: deployment
        uses: actions/deploy-pages@v4
